# Full infrastructure CI pipeline
#
# - backend and frontend run in parallel
# - integration waits for both to succeed, then spins up
#   the full docker-compose stack and smoke-tests it

name: Infrastructure test
run-name: ${{ github.actor }} is running the full CI pipeline

# minimum permissions granted to the workflow
permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: backend

      - name: copy shared folder
        run: cp -r shared/ backend/shared/

      # build:prod = type-check && tsc — covers both in one shot
      - name: type check and build
        run: npm run build:prod
        working-directory: backend

      - name: build Docker image
        run: docker build -t backend:image -f backend/Dockerfile .



  frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: frontend

      - name: type check
        run: npm run check
        working-directory: frontend

      - name: build project
        run: npm run build
        working-directory: frontend

      - name: build Docker image
        run: |
          docker build -t frontend:image frontend/

  integration:
    runs-on: ubuntu-24.04
    needs:  [backend, frontend] # only runs if both jobs above pass
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      # Reconstruct the .env file from GitHub Secrets
      # Add this file to .gitignore — never commit real values
      - name: create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"               >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"       >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"                   >> .env
          echo "POSTGRES_INITDB_ARGS=${{ secrets.POSTGRES_INITDB_ARGS }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"                 >> .env
          echo "DATABASE_URL_DOCKER=${{ secrets.DATABASE_URL_DOCKER }}"   >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"                     >> .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}"                       >> .env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"                   >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"             >> .env

      - name: build images
        run: docker compose build --no-cache

      - name: build backend with verbose
        run: docker build --no-cache --progress=plain -f backend/Dockerfile . 2>&1

      - name: start full stack  
        run: docker compose up -d --wait

      - name: show compose logs on failure
        if: failure()
        run: docker compose logs

      # Test the root route
      - name: test via NGINX front
        run: |
          curl -k -f https://localhost:8888/

      - name: nginx back with health
        run: |
          curl -k -f https://localhost:8888/api/health

      - name: tear down stack
        if: always()
        run: docker compose down -v


