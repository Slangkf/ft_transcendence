services:
  db:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10

    image: postgres:15-bookworm
    container_name: postgres_db
    restart: always
    networks: ["transcendence_network"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    image: redis:7-alpine
    container_name: redis
    networks: ["transcendence_network"]
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    sysctls:
      - net.core.somaxconn=511

  backend:
    healthcheck:
      test:  ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

    build: 
      context: .
      dockerfile: backend/Dockerfile
    volumes:
        - ./backend:/app
        - /app/node_modules 
        - ./shared:/app/shared
        - ./backend/avatars:/app/avatars
    container_name: backend
    networks: ["transcendence_network"]
    restart: always
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

    build: 
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    image: frontend:custom
    container_name: frontend
    networks: ["transcendence_network"]
    expose: ["5500"]
    restart: always

  nginx:
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    build: ./nginx
    image: nginx:custom
    container_name: nginx
    networks: ["transcendence_network"]
    ports: ["8888:8888"]
    restart: always


volumes:
  postgres_data:
  
networks:
  transcendence_network:
    name: transcendence_network
