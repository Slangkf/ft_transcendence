# Full infrastructure CI pipeline
#
# - backend and frontend run in parallel
# - integration waits for both to succeed, then spins up
#   the full docker-compose stack and smoke-tests it

name: Infrastructure test
run-name: ${{ github.actor }} is running the full CI pipeline

# minimum permissions granted to the workflow
permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: backend

      - name: copy shared folder
        run: cp -r shared/ backend/shared/

      # build:prod = type-check && tsc — covers both in one shot
      - name: type check and build
        run: npm run build:prod
        working-directory: backend

      - name: build Docker image
        run: docker build -t backend:image -f backend/Dockerfile .

      - name: run Docker container
        run: |
          docker run -d -p 3000:3000 --name backend-container backend:image

      - name: backend logs
        run: docker logs backend-container

      - name: test backend container
        run: |
          curl -f http://localhost:3000 || exit 1

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: frontend

      - name: type check
        run: npm run check
        working-directory: frontend

      - name: build project
        run: npm run build
        working-directory: frontend

      - name: build Docker image
        run: |
          docker build -t frontend:image frontend/

      - name: run Docker container
        run: |
          docker run -d -p 5500:5500 --name frontend-container frontend:image

      - name: test frontend container
        run: |
          sleep 5
          curl -f http://localhost:5500

  integration:
    runs-on: ubuntu-24.04
    needs:  [backend, frontend] # only runs if both jobs above pass
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      # Reconstruct the .env file from GitHub Secrets
      # Add this file to .gitignore — never commit real values
      - name: create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"               >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"       >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"                   >> .env
          echo "POSTGRES_INITDB_ARGS=${{ secrets.POSTGRES_INITDB_ARGS }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"                 >> .env
          echo "DATABASE_URL_DOCKER=${{ secrets.DATABASE_URL_DOCKER }}"   >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"                     >> .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}"                       >> .env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"                   >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"             >> .env

      - name: start full stack
        run: docker compose up --build -d

      # Postgres and Redis need time to initialize before the backend connects to them
      - name: wait for stack to be ready
        run: sleep 20

      - name: show compose logs
        run: docker compose logs 

      # Test the root route
      - name: test via NGINX
        run: |
          curl -f http://localhost:8888
          curl -o /dev/null -s -w "%{http_code}" http://localhost:8888/api | grep -qE "^(200|401|404)$"

      - name: tear down stack
        if: always()
        run: docker compose down -v


