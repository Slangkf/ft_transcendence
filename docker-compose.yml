services:
  db:
    healthcheck:
      test: "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
      interval: 3s
      timeout: 3s
      retries: 10

    image: postgres:15-bookworm
    container_name: postgres_db
    restart: always
    networks: ["transcendence_network"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    healthcheck:
      test: "redis-cli ping"
      interval: 5s
      timeout: 3s
      retries: 10

    image: redis:7-alpine
    container_name: redis
    networks: ["transcendence_network"]
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    sysctls:
      - net.core.somaxconn=511

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    secrets:
      - jwt_secret
      - google_client_id
      - google_client_secret
      - google_callback_url
      - github_client_id
      - github_client_secret
      - github_callback_url
    volumes:
        - ./backend:/app
        - /app/node_modules 
        - ./shared:/app/shared
        - ./backend/avatars:/app/avatars
    container_name: backend
    networks: ["transcendence_network"]
    restart: always
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - REDIS_URL=${REDIS_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    image: frontend:custom
    container_name: frontend
    networks: ["transcendence_network"]
    expose: ["5500"]
    restart: always

  nginx:
    depends_on:
      - backend
      - frontend
    build: ./nginx
    image: nginx:custom
    container_name: nginx
    networks: ["transcendence_network"]
    ports: ["8888:8888"]
    restart: always


volumes:
  postgres_data:
  
networks:
  transcendence_network:
    name: transcendence_network

secrets:
  jwt_secret:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  google_callback_url:
    external: true
  github_client_id:
    external: true
  github_client_secret:
    external: true
  github_callback_url:
    external: true
