# Every time a push or a pull-request to the main branch is made, 
# GitHub Actions will run the "frontend" job in its runner:
# 1. Checkout the repository code
# 2. Set up Node.js
# 3. Install npm dependencies
# 4. Run Svelte/TypeScript type checks
# 5. Build the project

name: app build test
run-name: ${{ github.actor }} is testing out GitHub Actions

permissions:
  contents: read # minimum permissions granted to the workflow

on:
  push:
    branches: [ "**" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nginx/**"
      - "shared/**"
      - "docker-compose.yml"

jobs:
  backend:
    runs-on: ubuntu-24.04
    
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: backend

      - name: type check and build
        run: npm run build:prod
        working-directory: backend

      - name: build Docker image
        run: docker build -t backend:image backend/

      - name: run Docker container
        run: |
          docker run -d -p 3000:3000 --name backend-container backend:image

      - name: test backend container
        run: |
          sleep 5
          curl -f http://localhost:3000
          curl -o /dev/null -s -w "%{http_code}" http://localhost:3000 | grep -qE "^(200|401|403|404)$"

  frontend:
    runs-on: ubuntu-24.04
    
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: frontend

      - name: type check
        run: npm run check
        working-directory: frontend

      - name: build project
        run: npm run build
        working-directory: frontend

      - name: build Docker image
        run: |
          docker build -t frontend:image frontend/

      - name: run Docker container
        run: |
          docker run -d -p 5500:5500 --name frontend-container frontend:image

      - name: test frontend container
        run: |
          sleep 5
          curl -f http://localhost:5500

  integration:
    runs-on: ubuntu-24.04
    needs:  [backend, frontend]
    
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: create .env file
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"               >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"       >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"                   >> .env
          echo "POSTGRES_INITDB_ARGS=${{ secrets.POSTGRES_INITDB_ARGS }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"                 >> .env
          echo "DATABASE_URL_DOCKER=${{ secrets.DATABASE_URL_DOCKER }}"   >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"                     >> .env
          echo "REDIS_URL=${{ secrets.REDIS_URL }}"                       >> .env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"                   >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"             >> .env

      - name: start full stack
        run: docker compose up --build

      - name: wait for stack to be ready
        run: sleep 20

      - name: test via NGINX
        run: |
          curl -f https://localhost:8888
          curl -o /dev/null -s -w "%{http_code}" http://localhost:8888/api | grep -qE "^(200|401|404)$"

      - name: build Docker image
        run: |
          docker build -t frontend:image frontend/

      - name: destroy stack
        if: always()
        run: |
          docker system prune -a
          docker compose dwon -v


