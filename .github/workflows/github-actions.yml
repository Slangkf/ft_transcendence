# Every time a push or a pull-request to the main branch is made, 
# GitHub Actions will run the "frontend" job in its runner:
# 1. Checkout the repository code
# 2. Set up Node.js
# 3. Install npm dependencies
# 4. Run Svelte/TypeScript type checks
# 5. Build the project

name: GitHub Actions frontend
run-name: ${{ github.actor }} is testing out GitHub Actions

permissions:
  contents: read # minimum permissions granted to the workflow

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  frontend:
    runs-on: ubuntu-24.04
    
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version:  24

      - name: install dependencies
        run: npm install
        working-directory: frontend

      - name: type check
        run: npm run check
        working-directory: frontend

      - name: build project
        run: npm run build
        working-directory: frontend
